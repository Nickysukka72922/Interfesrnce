<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STALKER - Pro Settings Edition</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black; position: fixed;
        }

        /* HUD & UI */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 150px; height: 150px; z-index: 1000;
            touch-action: none; 
        }

        #settings-btn {
            position: absolute; top: 10px; right: 10px;
            z-index: 3000; background: rgba(255,255,255,0.2);
            color: white; border: 1px solid white; padding: 8px;
            font-family: monospace; cursor: pointer; display: none;
        }

        #dev-toggle {
            position: absolute; top: 10px; left: 10px;
            z-index: 3000; padding: 10px; background: rgba(255,0,0,0.5);
            color: white; border: 1px solid white; font-family: monospace;
            font-size: 10px; display: none;
        }

        /* Settings Menu Panel */
        #settings-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; background: rgba(0,0,0,0.9); border: 2px solid white;
            color: white; font-family: monospace; padding: 20px;
            z-index: 4000; display: none; text-align: center;
        }

        .setting-row { margin: 15px 0; display: flex; flex-direction: column; }
        input[type=range] { cursor: pointer; }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 5000; display: flex;
            justify-content: center; align-items: center;
        }

        #start-button {
            padding: 20px 40px; background: white; color: black;
            border: none; font-family: monospace; font-weight: bold;
            cursor: pointer; font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-button">START GAME</button>
    </div>

    <div id="settings-menu">
        <h3>SETTINGS</h3>
        <div class="setting-row">
            <label>FOV: <span id="fov-val">80</span></label>
            <input type="range" id="fov-slider" min="40" max="120" value="80">
        </div>
        <div class="setting-row">
            <label>SHOW FPS: <input type="checkbox" id="fps-toggle"></label>
        </div>
        <button onclick="toggleSettings()" style="margin-top:10px; padding:5px;">CLOSE</button>
    </div>

    <button id="dev-toggle">DEV MODE: OFF</button>
    <button id="settings-btn" onclick="toggleSettings()">SETTINGS</button>
    
    <div id="joystick-zone"></div>

    <a-scene id="mainScene" embedded vr-mode-ui="enabled: false" 
             fog="type: exponential; color: #000; density: 0.35" 
             stats="false"> <a-sky id="gameSky" color="#000"></a-sky>

        <a-entity id="rig">
            <a-entity id="camera" camera="fov: 80" 
                      look-controls="magicWindowTrackingEnabled: false; touchEnabled: true; reverseMouseDrag: false; reverseTouchDrag: false" 
                      position="0 1.6 0">
                <a-light id="flashlight" type="spot" color="#fff" intensity="2.5" distance="30" angle="35" penumbra="0.5" castShadow="true"></a-light>
                <a-light id="ambientLight" type="ambient" color="#666" intensity="0.3"></a-light>
            </a-entity>
        </a-entity>

        <a-entity id="devSun" light="type: directional; intensity: 0; castShadow: false" position="-1 1 1"></a-entity>
        <a-plane rotation="-90 0 0" width="1000" height="1000" color="#111" shadow="receive: true"></a-plane>
        <a-entity id="world"></a-entity>
    </a-scene>

    <script>
        const world = document.querySelector('#world');
        const rig = document.querySelector('#rig');
        const cameraEntity = document.querySelector('#camera');
        const scene = document.querySelector('#mainScene');
        
        let moveForce = { x: 0, y: 0 };
        const moveSpeed = 0.16;

        // Generate World
        for (let i = 0; i < 180; i++) {
            const tree = document.createElement('a-box');
            const x = (Math.random() - 0.5) * 160;
            const z = (Math.random() - 0.5) * 160;
            const h = Math.random() * 12 + 4;
            tree.setAttribute('position', `${x} ${h/2} ${z}`);
            tree.setAttribute('width', '0.3');
            tree.setAttribute('depth', '0.3');
            tree.setAttribute('height', h);
            tree.setAttribute('color', '#0a0a0a');
            world.appendChild(tree);
        }

        // Settings Logic
        function toggleSettings() {
            const menu = document.getElementById('settings-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        document.getElementById('fov-slider').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('fov-val').innerText = val;
            cameraEntity.setAttribute('camera', 'fov', val);
        });

        document.getElementById('fps-toggle').addEventListener('change', (e) => {
            scene.setAttribute('stats', e.target.checked);
        });

        // Dev Mode Logic
        document.getElementById('dev-toggle').addEventListener('click', function() {
            const active = this.innerText.includes("OFF");
            this.innerText = active ? "DEV MODE: ON" : "DEV MODE: OFF";
            this.style.background = active ? "rgba(0,255,0,0.5)" : "rgba(255,0,0,0.5)";
            scene.setAttribute('fog', 'density', active ? 0 : 0.35);
            document.querySelector('#gameSky').setAttribute('color', active ? '#87CEEB' : '#000');
            document.querySelector('#devSun').setAttribute('light', 'intensity', active ? 1 : 0);
        });

        // Start Game
        document.querySelector('#start-button').addEventListener('click', function() {
            document.querySelector('#start-screen').style.display = 'none';
            document.getElementById('dev-toggle').style.display = 'block';
            document.getElementById('settings-btn').style.display = 'block';

            nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static', position: { left: '50%', top: '50%' }, color: 'white'
            }).on('move', (evt, data) => {
                const force = Math.min(data.force, 1);
                const angle = data.angle.radian;
                moveForce.x = -Math.cos(angle) * force; 
                moveForce.y = Math.sin(angle) * force;
            }).on('end', () => { moveForce = { x: 0, y: 0 }; });
        });

        function update() {
            if (moveForce.x !== 0 || moveForce.y !== 0) {
                const direction = new THREE.Vector3();
                cameraEntity.object3D.getWorldDirection(direction);
                const sideDir = new THREE.Vector3();
                sideDir.crossVectors(new THREE.Vector3(0, 1, 0), direction).normalize();
                rig.object3D.position.addScaledVector(direction, -moveForce.y * moveSpeed);
                rig.object3D.position.addScaledVector(sideDir, moveForce.x * moveSpeed);
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
