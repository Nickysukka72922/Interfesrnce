<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STALKER - Master Invert Fixed</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black; position: fixed;
        }

        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 150px; height: 150px; z-index: 1000;
            touch-action: none; 
        }

        #settings-btn {
            position: absolute; top: 10px; right: 10px;
            z-index: 3000; background: rgba(255,255,255,0.2);
            color: white; border: 1px solid white; padding: 8px;
            font-family: monospace; cursor: pointer; display: none;
        }

        #dev-toggle {
            position: absolute; top: 10px; left: 10px;
            z-index: 3000; padding: 10px; background: rgba(255,0,0,0.5);
            color: white; border: 1px solid white; font-family: monospace;
            font-size: 10px; display: none;
        }

        #settings-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; background: rgba(0,0,0,0.95); border: 2px solid #444;
            color: white; font-family: monospace; padding: 20px;
            z-index: 4000; display: none; text-align: center;
            border-radius: 10px;
        }

        .setting-row { margin: 15px 0; display: flex; flex-direction: column; align-items: center;}
        input[type=range] { width: 80%; cursor: pointer; }
        label { font-size: 11px; margin-bottom: 5px; color: #aaa; text-transform: uppercase; }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 5000; display: flex;
            justify-content: center; align-items: center;
        }

        #start-button {
            padding: 20px 40px; background: white; color: black;
            border: none; font-family: monospace; font-weight: bold;
            cursor: pointer; font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-button">START GAME</button>
    </div>

    <div id="settings-menu">
        <h2 style="margin-top:0; color:white;">SYSTEM SETTINGS</h2>
        
        <div class="setting-row">
            <label>Field of View: <span id="fov-val">80</span></label>
            <input type="range" id="fov-slider" min="40" max="120" value="80">
        </div>

        <div class="setting-row">
            <label>Performance Cap: <span id="fps-limit-val">60</span> FPS</label>
            <input type="range" id="fps-slider" min="15" max="120" value="60">
        </div>

        <div class="setting-row" style="flex-direction: row; justify-content: space-between; width: 90%;">
            <label>INVERT ALL CONTROLS</label>
            <input type="checkbox" id="invert-toggle">
        </div>

        <div class="setting-row" style="flex-direction: row; justify-content: space-between; width: 90%;">
            <label>STATS FOR NERDS</label>
            <input type="checkbox" id="stats-toggle">
        </div>

        <button onclick="toggleSettings()" style="margin-top:15px; width: 100%; padding: 10px; background: #333; color: white; border: none; cursor: pointer;">RETURN TO ZONE</button>
    </div>

    <button id="dev-toggle">DEV MODE: OFF</button>
    <button id="settings-btn" onclick="toggleSettings()">SETTINGS</button>
    
    <div id="joystick-zone"></div>

    <a-scene id="mainScene" embedded vr-mode-ui="enabled: false">
        <a-sky id="gameSky" color="#000"></a-sky>

        <a-entity id="rig">
            <a-entity id="camera" camera="fov: 80" 
                      look-controls="magicWindowTrackingEnabled: false; touchEnabled: true;" 
                      position="0 1.6 0">
                <a-light id="flashlight" type="spot" color="#fff" intensity="2.5" distance="30" angle="35" penumbra="0.5" castShadow="true"></a-light>
                <a-light id="ambientLight" type="ambient" color="#666" intensity="0.3"></a-light>
            </a-entity>
        </a-entity>

        <a-entity id="devSun" light="type: directional; intensity: 0; castShadow: false" position="-1 1 1"></a-entity>
        <a-plane rotation="-90 0 0" width="1000" height="1000" color="#111" shadow="receive: true"></a-plane>
        <a-entity id="world"></a-entity>
    </a-scene>

    <script>
        const world = document.querySelector('#world');
        const rig = document.querySelector('#rig');
        const cameraEntity = document.querySelector('#camera');
        const scene = document.querySelector('#mainScene');
        
        let moveForce = { x: 0, y: 0 };
        const moveSpeed = 0.16;
        let lastFrameTime = 0;
        let fpsLimit = 60;
        let globalInverted = false;

        // Generate Forest
        for (let i = 0; i < 180; i++) {
            const tree = document.createElement('a-box');
            const x = (Math.random() - 0.5) * 160;
            const z = (Math.random() - 0.5) * 160;
            const h = Math.random() * 12 + 4;
            tree.setAttribute('position', `${x} ${h/2} ${z}`);
            tree.setAttribute('width', '0.3');
            tree.setAttribute('depth', '0.3');
            tree.setAttribute('height', h);
            tree.setAttribute('color', '#0a0a0a');
            world.appendChild(tree);
        }

        function toggleSettings() {
            const menu = document.getElementById('settings-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        document.getElementById('fov-slider').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('fov-val').innerText = val;
            cameraEntity.setAttribute('camera', 'fov', val);
        });

        document.getElementById('fps-slider').addEventListener('input', (e) => {
            fpsLimit = e.target.value;
            document.getElementById('fps-limit-val').innerText = fpsLimit;
        });

        document.getElementById('stats-toggle').addEventListener('change', (e) => {
            scene.setAttribute('stats', e.target.checked);
        });

        // RE-CALIBRATED MASTER INVERT
        document.getElementById('invert-toggle').addEventListener('change', (e) => {
            globalInverted = e.target.checked;
            
            // Invert Camera Look
            cameraEntity.removeAttribute('look-controls');
            setTimeout(() => {
                cameraEntity.setAttribute('look-controls', {
                    magicWindowTrackingEnabled: false,
                    touchEnabled: true,
                    // Swapping logic to ensure "Invert" actually flips it from standard
                    reverseMouseDrag: globalInverted, 
                    reverseTouchDrag: globalInverted 
                });
            }, 10);
        });

        document.getElementById('dev-toggle').addEventListener('click', function() {
            const active = this.innerText.includes("OFF");
            this.innerText = active ? "DEV MODE: ON" : "DEV MODE: OFF";
            this.style.background = active ? "rgba(0,255,0,0.5)" : "rgba(255,0,0,0.5)";
            scene.setAttribute('fog', 'type: exponential; color: #000; density: ' + (active ? '0' : '0.35'));
            document.querySelector('#gameSky').setAttribute('color', active ? '#87CEEB' : '#000');
            document.querySelector('#devSun').setAttribute('light', 'intensity', active ? 1 : 0);
        });

        document.querySelector('#start-button').addEventListener('click', function() {
            document.querySelector('#start-screen').style.display = 'none';
            document.getElementById('dev-toggle').style.display = 'block';
            document.getElementById('settings-btn').style.display = 'block';

            nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static', position: { left: '50%', top: '50%' }, color: 'white'
            }).on('move', (evt, data) => {
                const force = Math.min(data.force, 1);
                const angle = data.angle.radian;
                
                // CORRECTED DEFAULT MOVEMENT: 
                // x = cos(angle), y = sin(angle)
                let xBasis = Math.cos(angle) * force;
                let yBasis = Math.sin(angle) * force;

                // Apply Master Invert to Move Axes
                if (globalInverted) {
                    moveForce.x = -xBasis; // Invert Left/Right
                    moveForce.y = -yBasis; // Invert Forward/Back
                } else {
                    moveForce.x = xBasis;  // Normal Left/Right
                    moveForce.y = yBasis;  // Normal Forward/Back
                }
            }).on('end', () => { moveForce = { x: 0, y: 0 }; });
        });

        function update(time) {
            const delta = time - lastFrameTime;
            const interval = 1000 / fpsLimit;

            if (delta > interval) {
                lastFrameTime = time - (delta % interval);

                if (moveForce.x !== 0 || moveForce.y !== 0) {
                    const direction = new THREE.Vector3();
                    cameraEntity.object3D.getWorldDirection(direction);
                    const sideDir = new THREE.Vector3();
                    sideDir.crossVectors(new THREE.Vector3(0, 1, 0), direction).normalize();
                    
                    // Move based on relative camera angle
                    rig.object3D.position.addScaledVector(direction, -moveForce.y * moveSpeed);
                    rig.object3D.position.addScaledVector(sideDir, moveForce.x * moveSpeed);
                }
            }
            requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    </script>
</body>
</html>
