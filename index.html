<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STALKER - Dev Mode Edition</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black; position: fixed;
            touch-action: none; 
        }

        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; z-index: 1000;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 2000; display: flex;
            justify-content: center; align-items: center;
        }

        #start-button {
            padding: 20px 40px; background: white; color: black;
            border: none; font-family: monospace; font-weight: bold;
            cursor: pointer; font-size: 1.2rem;
        }

        /* Dev Mode Button Styling */
        #dev-toggle {
            position: absolute; top: 10px; left: 10px;
            z-index: 3000; padding: 10px; background: rgba(255,0,0,0.5);
            color: white; border: 1px solid white; font-family: monospace;
            font-size: 10px; display: none; /* Hide until game starts */
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-button">START GAME</button>
    </div>

    <button id="dev-toggle">DEV MODE: OFF</button>
    <div id="joystick-zone"></div>

    <a-scene id="mainScene" embedded vr-mode-ui="enabled: false" fog="type: exponential; color: #000; density: 0.35">
        <a-sky id="gameSky" color="#000"></a-sky>

        <a-entity id="rig">
            <a-entity id="camera" camera look-controls position="0 1.6 0">
                <a-light id="flashlight" type="spot" color="#fff" intensity="2.5" distance="30" angle="35" penumbra="0.5" castShadow="true"></a-light>
                <a-light id="ambientLight" type="ambient" color="#666" intensity="0.3"></a-light>
            </a-entity>
        </a-entity>

        <a-entity id="devSun" light="type: directional; intensity: 0; castShadow: false" position="-1 1 1"></a-entity>

        <a-plane rotation="-90 0 0" width="1000" height="1000" color="#111" shadow="receive: true"></a-plane>
        <a-entity id="world"></a-entity>
    </a-scene>

    <script>
        const world = document.querySelector('#world');
        const rig = document.querySelector('#rig');
        const camera = document.querySelector('#camera');
        const devBtn = document.querySelector('#dev-toggle');
        const scene = document.querySelector('#mainScene');
        const devSun = document.querySelector('#devSun');
        const sky = document.querySelector('#gameSky');
        const ambient = document.querySelector('#ambientLight');
        
        let moveForce = { x: 0, y: 0 };
        const moveSpeed = 0.16;
        let devModeActive = false;

        // Generate World
        for (let i = 0; i < 180; i++) {
            const tree = document.createElement('a-box');
            const x = (Math.random() - 0.5) * 160;
            const z = (Math.random() - 0.5) * 160;
            const h = Math.random() * 12 + 4;
            tree.setAttribute('position', `${x} ${h/2} ${z}`);
            tree.setAttribute('width', '0.3');
            tree.setAttribute('depth', '0.3');
            tree.setAttribute('height', h);
            tree.setAttribute('color', '#0a0a0a');
            world.appendChild(tree);
        }

        // Dev Mode Logic
        devBtn.addEventListener('click', () => {
            devModeActive = !devModeActive;
            if (devModeActive) {
                // TURN ON BRIGHT MODE
                devBtn.innerText = "DEV MODE: ON";
                scene.setAttribute('fog', 'density: 0'); // Remove fog
                sky.setAttribute('color', '#87CEEB'); // Blue sky
                devSun.setAttribute('light', 'intensity: 1'); // Turn on sun
                ambient.setAttribute('light', 'intensity: 0.8'); // Brighten ambient
                devBtn.style.background = "rgba(0,255,0,0.5)";
            } else {
                // TURN ON HORROR MODE
                devBtn.innerText = "DEV MODE: OFF";
                scene.setAttribute('fog', 'density: 0.35'); // Add fog back
                sky.setAttribute('color', '#000'); // Black sky
                devSun.setAttribute('light', 'intensity: 0'); // Turn off sun
                ambient.setAttribute('light', 'intensity: 0.3'); // Darken ambient
                devBtn.style.background = "rgba(255,0,0,0.5)";
            }
        });

        // Start Logic
        document.querySelector('#start-button').addEventListener('click', function() {
            document.querySelector('#start-screen').style.display = 'none';
            devBtn.style.display = 'block'; // Show dev button when playing

            const manager = nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static',
                position: { left: '50%', top: '50%' },
                color: 'white'
            });

            manager.on('move', (evt, data) => {
                const force = Math.min(data.force, 1);
                const angle = data.angle.radian;
                moveForce.x = Math.cos(angle) * force;
                moveForce.y = Math.sin(angle) * force;
            });

            manager.on('end', () => { moveForce = { x: 0, y: 0 }; });
        });

        function update() {
            if (moveForce.x !== 0 || moveForce.y !== 0) {
                const direction = new THREE.Vector3();
                camera.object3D.getWorldDirection(direction);
                const sideDir = new THREE.Vector3();
                sideDir.crossVectors(new THREE.Vector3(0, 1, 0), direction).normalize();

                rig.object3D.position.addScaledVector(direction, -moveForce.y * moveSpeed);
                rig.object3D.position.addScaledVector(sideDir, moveForce.x * moveSpeed);
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
