<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STALKER - GitHub Fix</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black; position: fixed;
            touch-action: none; 
        }

        #noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.15; z-index: 100; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        #vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, black 90%);
            z-index: 101; pointer-events: none;
        }

        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; z-index: 1000;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: flex;
            justify-content: center; align-items: center;
        }

        #start-button {
            padding: 20px 40px; background: white; color: black;
            border: none; font-family: monospace; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-button">START GAME</button>
    </div>

    <div id="joystick-zone"></div>
    <div id="noise-overlay"></div>
    <div id="vignette"></div>

    <a-scene embedded vr-mode-ui="enabled: false" fog="type: exponential; color: #000; density: 0.3">
        <a-sky color="#000"></a-sky>

        <a-entity id="rig">
            <a-entity id="camera" camera look-controls position="0 1.6 0">
                <a-light id="flashlight" type="spot" color="#fff" intensity="2" distance="20" angle="30" penumbra="0.5" castShadow="true"></a-light>
                <a-light type="ambient" color="#333" intensity="0.2"></a-light>
            </a-entity>
        </a-entity>

        <a-plane rotation="-90 0 0" width="1000" height="1000" color="#111" shadow="receive: true"></a-plane>
        <a-entity id="world"></a-entity>
    </a-scene>

    <script>
        const world = document.querySelector('#world');
        const rig = document.querySelector('#rig');
        const camera = document.querySelector('#camera');
        
        let moveForce = { x: 0, y: 0 };
        const moveSpeed = 0.15;

        // GENERATE WORLD IMMEDIATELY
        for (let i = 0; i < 150; i++) {
            const tree = document.createElement('a-box');
            const x = (Math.random() - 0.5) * 150;
            const z = (Math.random() - 0.5) * 150;
            const h = Math.random() * 10 + 5;
            tree.setAttribute('position', `${x} ${h/2} ${z}`);
            tree.setAttribute('width', '0.2');
            tree.setAttribute('depth', '0.2');
            tree.setAttribute('height', h);
            tree.setAttribute('color', '#050505');
            world.appendChild(tree);
        }

        // START BUTTON HANDLER
        document.querySelector('#start-button').addEventListener('click', function() {
            document.querySelector('#start-screen').style.display = 'none';
            
            // Fullscreen fix for mobile
            const scene = document.querySelector('a-scene');
            if (scene.requestFullscreen) scene.requestFullscreen();

            // Setup Joystick
            const manager = nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static',
                position: { left: '50%', top: '50%' },
                color: 'white'
            });

            manager.on('move', (evt, data) => {
                const force = Math.min(data.force, 1);
                const angle = data.angle.radian;
                moveForce.x = Math.cos(angle) * force;
                moveForce.y = Math.sin(angle) * force;
            });

            manager.on('end', () => { moveForce = { x: 0, y: 0 }; });
        });

        // MOVEMENT LOOP
        function update() {
            if (moveForce.x !== 0 || moveForce.y !== 0) {
                const direction = new THREE.Vector3();
                camera.object3D.getWorldDirection(direction);
                const sideDir = new THREE.Vector3();
                sideDir.crossVectors(new THREE.Vector3(0, 1, 0), direction).normalize();

                rig.object3D.position.addScaledVector(direction, -moveForce.y * moveSpeed);
                rig.object3D.position.addScaledVector(sideDir, moveForce.x * moveSpeed);
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
